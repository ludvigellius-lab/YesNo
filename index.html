<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Yes/No">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<title>Yes / No</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: #fff;
    gap: 2.5rem;
  }
  #result {
    font-size: clamp(4rem, 18vw, 12rem);
    font-weight: 800;
    letter-spacing: 0.05em;
    min-height: 1.1em;
    line-height: 1;
    text-transform: uppercase;
    transition: color 0.3s ease;
  }
  #result.idle { color: #555; }
  #result.spinning { color: #888; }
  #result.yes { color: #4ade80; text-shadow: 0 0 30px rgba(74, 222, 128, 0.5); }
  #result.no  { color: #f87171; text-shadow: 0 0 30px rgba(248, 113, 113, 0.5); }
  #result.reveal { animation: pop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes pop {
    0%   { transform: scale(0.6); opacity: 0; }
    60%  { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  button {
    font: inherit;
    font-size: 1.25rem;
    font-weight: 600;
    padding: 1rem 2.5rem;
    border: none;
    border-radius: 999px;
    background: #fff;
    color: #1a1a2e;
    cursor: pointer;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }
  button:hover:not(:disabled) { transform: translateY(-2px); }
  button:active:not(:disabled) { transform: translateY(0); }
  button:disabled { opacity: 0.5; cursor: wait; }
</style>
</head>
<body>
  <div id="result" class="idle">?</div>
  <button id="go">Ask</button>

<script>
  const result = document.getElementById('result');
  const button = document.getElementById('go');
  const SPIN_MS = 1200;
  const TICK_MS = 70;

  button.addEventListener('click', () => {
    button.disabled = true;
    result.classList.remove('yes', 'no', 'idle', 'reveal');
    result.classList.add('spinning');

    const start = performance.now();
    const tick = () => {
      const elapsed = performance.now() - start;
      result.textContent = Math.random() < 0.5 ? 'Yes' : 'No';
      if (elapsed < SPIN_MS) {
        setTimeout(tick, TICK_MS);
      } else {
        const answer = Math.random() < 0.5;
        result.textContent = answer ? 'Yes' : 'No';
        result.classList.remove('spinning');
        result.classList.add(answer ? 'yes' : 'no', 'reveal');
        button.disabled = false;
      }
    };
    tick();
  });

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
